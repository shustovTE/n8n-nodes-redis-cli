# Publishes this n8n community node to npm automatically on every version tag,
# using npm OIDC Trusted Publishing — no NPM_TOKEN secret is stored anywhere.
#
# After setup you never build or publish from your machine again: you only push
# a version tag (locally with `npm run release`, or entirely from the GitHub UI
# by bumping package.json and creating a Release). CI then lints, builds and
# publishes with an npm provenance attestation.
#
# ─── ONE-TIME SETUP (Trusted Publishing) ────────────────────────────────────
#
#   On npmjs.com → the n8n-nodes-redis-cli package → Settings →
#   "Trusted Publishers" → Add publisher → GitHub Actions, and fill in:
#       Organization or user: shustovTE
#       Repository:           n8n-nodes-redis-cli
#       Workflow filename:    publish.yml
#       Environment:          (leave blank)
#
#   That's it — no repository secret is needed. GitHub's OIDC token is exchanged
#   for a short-lived npm credential at publish time. The repo, workflow name
#   and `id-token: write` permission below must match the publisher config, or
#   npm rejects the publish.
#
# ─── HOW TO RELEASE ─────────────────────────────────────────────────────────
#
#   Local (recommended):  npm run release   # bumps version, tags, pushes -> CI
#   From GitHub only:      bump "version" in package.json, commit, then create a
#                          Release whose tag matches that version (e.g. 0.2.1).
#
# npm publishes the version in package.json — the tag only triggers the run, so
# the tag and package.json version must match, and must be higher than the last
# published version.

name: Publish

on:
  push:
    tags:
      # Matches 0.2.1, 1.0.0, 2.0.0-rc.1, etc. Use ['v*.*.*'] for a "v" prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint the OIDC token used for Trusted Publishing + provenance.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        # OIDC Trusted Publishing requires npm >= 11.5; Node LTS still ships npm 10.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Release
        # In CI, `npm run release` runs lint + build, then `npm publish` with
        # provenance. No token: npm performs the OIDC exchange automatically
        # because a Trusted Publisher is configured for this repo + workflow.
        run: npm run release
