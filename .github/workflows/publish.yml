# Publishes this n8n community node to npm automatically on every version tag,
# authenticating with an npm token stored as the NPM_TOKEN repository secret.
#
# After setup you never build or publish from your machine again: you only push
# a version tag (locally with `npm run release`, or entirely from the GitHub UI
# by bumping package.json and creating a Release). CI then lints, builds and
# publishes with an npm provenance attestation.
#
# ─── ONE-TIME SETUP (npm token) ─────────────────────────────────────────────
#
#   1. Create the token on npmjs.com → Access Tokens → Generate New Token →
#      "Granular Access Token":
#        - Packages and scopes: Read and write, limited to n8n-nodes-redis-cli
#        - Expiration: pick a date and set a reminder to rotate it
#      (A classic "Automation" token works too.) Both token types are made for
#      CI and skip the interactive 2FA one-time-password prompt, so 2FA on your
#      account does not block this workflow.
#
#   2. Add it to GitHub: repo → Settings → Secrets and variables → Actions →
#      New repository secret → name it exactly NPM_TOKEN and paste the value.
#
# ─── HOW TO RELEASE ─────────────────────────────────────────────────────────
#
#   Local (recommended):  npm run release   # bumps version, tags, pushes -> CI
#   From GitHub only:      bump "version" in package.json, commit, then create a
#                          Release whose tag matches that version (e.g. 0.2.1).
#
# npm publishes the version in package.json — the tag only triggers the run, so
# the tag and package.json version must match, and must be higher than the last
# published version.

name: Publish

on:
  push:
    tags:
      # Matches 0.2.1, 1.0.0, 2.0.0-rc.1, etc. Use ['v*.*.*'] for a "v" prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint the OIDC token for the provenance attestation (the npm
      # token below handles registry authentication; provenance is separate).
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Release
        # In CI, `npm run release` runs lint + build, then `npm publish` with
        # provenance. We write the token straight to .npmrc instead of using
        # setup-node's `registry-url`, which avoids the deprecated `always-auth`
        # key that newer npm warns about.
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
